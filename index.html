<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elysian Softwares</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --coin-size: clamp(240px, 60vw, 400px);
            --thickness: 30px;
        }

        body {
            height: 100dvh; /* Usa dynamic viewport height para mobile */
            width: 100%;
            background: #02040a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            color: #fff;
            overflow: hidden;
            perspective: 2000px;
        }

        .ambient-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0f172a 0%, #02040a 80%);
            z-index: -1;
        }

        /* Container Principal em Grid para estabilidade total */
        .main-layout {
            display: grid;
            grid-template-rows: 1fr auto;
            width: 100%;
            height: 100%;
            max-width: 600px;
            padding: 20px;
            z-index: 10;
        }

        /* Area da Moeda */
        .coin-section {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .coin-wrapper {
            width: var(--coin-size);
            height: var(--coin-size);
            position: relative;
            transform-style: preserve-3d;
        }

        .coin {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .coin-layer {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 1px #1e293b;
        }

        .face {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background: #05070f;
        }

        .front {
            transform: translateZ(calc(var(--thickness) / 2));
            border: 2px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }

        .front img { width: 100%; height: 100%; object-fit: cover; }

        .back {
            transform: rotateY(180deg) translateZ(calc(var(--thickness) / 2));
            flex-direction: column;
            border: 2px solid rgba(255,255,255,0.1);
            box-shadow: inset 0 0 80px rgba(0,0,0,0.9);
            text-align: center;
            padding: 15px;
        }

        .back h1 { 
            font-size: clamp(18px, 5vw, 26px);
            letter-spacing: 4px;
            background: linear-gradient(to bottom, #fff, #64748b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back p { font-size: 10px; opacity: 0.4; margin-top: 8px; letter-spacing: 2px; text-transform: uppercase; }

        /* Rodapé Fixo */
        footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding: 20px 0;
        }

        .social-links { 
            display: flex; 
            gap: 20px; 
            justify-content: center;
            align-items: center;
            min-height: 50px; /* Garante que os ícones tenham espaço */
        }

        .social-icon {
            font-size: 22px;
            color: rgba(255,255,255,0.5);
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            text-decoration: none !important;
            transition: 0.3s;
        }

        .social-icon:hover, .social-icon:active {
            color: #fff;
            background: rgba(255,255,255,0.15);
            transform: translateY(-3px);
        }

        .copyright {
            font-size: 11px;
            color: rgba(255,255,255,0.2);
            letter-spacing: 1px;
            text-align: center;
        }

        /* Ajustes Mobile Extremos */
        @media (max-height: 600px) {
            :root { --coin-size: 200px; }
            .main-layout { padding: 10px; }
            footer { gap: 10px; padding: 10px 0; }
        }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>

    <div class="main-layout">
        <section class="coin-section">
            <div class="coin-wrapper" id="wrapper">
                <div class="coin" id="coin">
                    <div class="face front">
                        <img src="logo.jpeg" alt="Logo">
                    </div>
                    <div class="face back">
                        <h1>COMING SOON</h1>
                        <p>Mantenha o Foco</p>
                    </div>
                </div>
            </div>
        </section>

        <footer>
            <div class="social-links">
                <a href="https://www.instagram.com/elysian_softwares/" target="_blank" class="social-icon">
                    <i class="fab fa-instagram"></i>
                </a>
                <a href="https://www.linkedin.com/company/elysian_softwares/" target="_blank" class="social-icon">
                    <i class="fab fa-linkedin-in"></i>
                </a>
            </div>
            <p class="copyright">Elysian Softwares 2026</p>
        </footer>
    </div>

    <script>
        const coin = document.getElementById('coin');
        const wrapper = document.getElementById('wrapper');
        const numLayers = 100; 
        const thickness = 30; 

        for (let i = 0; i < numLayers; i++) {
            const layer = document.createElement('div');
            layer.className = 'coin-layer';
            const zTranslate = (i * (thickness / numLayers)) - (thickness / 2);
            layer.style.transform = `translateZ(${zTranslate}px)`;
            layer.style.background = i % 4 === 0 ? "#1e293b" : "#0f172a";
            coin.appendChild(layer);
        }

        let autoRotation = 0;
        let targetX = 0, targetY = 0;
        let currentX = 0, currentY = 0;

        const updateTilt = (x, y) => {
            const rect = wrapper.getBoundingClientRect();
            targetX = -((y - rect.top) / rect.height - 0.5) * 40;
            targetY = ((x - rect.left) / rect.width - 0.5) * 40;
        };

        wrapper.addEventListener('mousemove', (e) => updateTilt(e.clientX, e.clientY));
        wrapper.addEventListener('touchmove', (e) => {
            updateTilt(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: true });

        const reset = () => { targetX = 0; targetY = 0; };
        wrapper.addEventListener('mouseleave', reset);
        wrapper.addEventListener('touchend', reset);

        function animate() {
            autoRotation = (autoRotation + 0.4) % 360;
            currentX += (targetX - currentX) * 0.05;
            currentY += (targetY - currentY) * 0.05;
            coin.style.transform = `rotateX(${currentX}deg) rotateY(${autoRotation + currentY}deg)`;
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
