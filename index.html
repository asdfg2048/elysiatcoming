<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elysian Softwares</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            height: 100vh;
            width: 100vw;
            background: #02040a;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Fundo */
        .ambient {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #0f172a 0%, #02040a 100%);
            z-index: 1;
        }

        /* Container da Moeda */
        .coin-container {
            position: relative;
            z-index: 2;
            perspective: 1500px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .coin-wrapper {
            /* Tamanho dinâmico e seguro */
            width: min(70vw, 350px);
            height: min(70vw, 350px);
            position: relative;
            transform-style: preserve-3d;
        }

        .coin {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .coin-layer {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: #111827;
            pointer-events: none;
            box-shadow: 0 0 1px rgba(255,255,255,0.05);
        }

        .face {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background: #05070f;
        }

        .front {
            transform: translateZ(15px); /* Espessura fixa e segura */
            border: 2px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }

        .front img { width: 100%; height: 100%; object-fit: cover; }

        .back {
            transform: rotateY(180deg) translateZ(15px);
            border: 2px solid rgba(255,255,255,0.1);
            background: #02040a;
            flex-direction: column;
            text-align: center;
            padding: 10px;
        }

        .back h1 { 
            font-size: clamp(16px, 5vw, 24px);
            letter-spacing: 3px;
            background: linear-gradient(to bottom, #fff, #64748b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back p { font-size: 9px; opacity: 0.4; margin-top: 5px; text-transform: uppercase; letter-spacing: 2px; }

        /* Rodapé Robusto */
        footer {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 10;
        }

        .social-links { display: flex; gap: 20px; }

        .social-icon {
            font-size: 20px;
            color: rgba(255,255,255,0.4);
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            text-decoration: none !important;
            transition: 0.3s;
        }

        .social-icon:hover {
            color: #fff;
            transform: translateY(-3px);
            background: rgba(255,255,255,0.1);
        }

        .copyright {
            font-size: 10px;
            color: rgba(255,255,255,0.2);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="ambient"></div>

    <div class="coin-container">
        <div class="coin-wrapper" id="wrapper">
            <div class="coin" id="coin">
                <div class="face front">
                    <img src="logo.jpeg" alt="Logo">
                </div>
                <div class="face back">
                    <h1>COMING SOON</h1>
                    <p>Mantenha o Foco</p>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="social-links">
            <a href="https://www.instagram.com/elysian_softwares/" target="_blank" class="social-icon">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="https://www.linkedin.com/company/elysian-softwares/" target="_blank" class="social-icon">
                <i class="fab fa-linkedin-in"></i>
            </a>
        </div>
        <p class="copyright">Elysian Softwares 2026</p>
    </footer>

    <script>
        const coin = document.getElementById('coin');
        const wrapper = document.getElementById('wrapper');
        
        // Reduzido para 60 camadas para máxima performance mobile
        const layers = 60;
        const totalThickness = 30; // pixels

        for (let i = 0; i < layers; i++) {
            const layer = document.createElement('div');
            layer.className = 'coin-layer';
            const z = (i * (totalThickness / layers)) - (totalThickness / 2);
            layer.style.transform = `translateZ(${z}px)`;
            layer.style.background = i % 2 === 0 ? "#111827" : "#0a0f1d";
            coin.appendChild(layer);
        }

        let autoRot = 0;
        let tX = 0, tY = 0, cX = 0, cY = 0;

        const move = (x, y) => {
            const r = wrapper.getBoundingClientRect();
            tX = -((y - r.top) / r.height - 0.5) * 35;
            tY = ((x - r.left) / r.width - 0.5) * 35;
        };

        window.addEventListener('mousemove', (e) => move(e.clientX, e.clientY));
        window.addEventListener('touchmove', (e) => move(e.touches[0].clientX, e.touches[0].clientY), {passive: true});
        
        const rst = () => { tX = 0; tY = 0; };
        window.addEventListener('mouseleave', rst);
        window.addEventListener('touchend', rst);

        function loop() {
            autoRot = (autoRot + 0.4) % 360;
            cX += (tX - cX) * 0.08;
            cY += (tY - cY) * 0.08;
            coin.style.transform = `rotateX(${cX}deg) rotateY(${autoRot + cY}deg)`;
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
