<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elysian - Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background: radial-gradient(circle at center, #0b1020, #05070f);
  font-family: 'Inter', sans-serif;
  color:white;
}

/* container 3D */
.scene {
  perspective: 1200px;
}

/* disco */
.circle {
  width:420px;
  height:420px;
  position:relative;
  transform-style: preserve-3d;
  animation: rotateY 8s ease-in-out infinite;
}

/* glow girando separado */
.circle::before {
  content:"";
  position:absolute;
  inset:-10px;
  border-radius:50%;
  background: conic-gradient(#3b82f6, #6366f1, #3b82f6);
  filter: blur(12px);
  animation: spin 10s linear infinite;
  z-index:-1;
}

/* faces */
.face {
  position:absolute;
  width:100%;
  height:100%;
  border-radius:50%;
  backface-visibility: hidden;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* frente (logo) */
.front {
  background:#0b1020;
}

.front img {
  width:100%;
  height:100%;
  object-fit: cover;   /* ocupa tudo */
  border-radius:50%;
}

/* verso (coming soon) */
.back {
  background:#020617;
  transform: rotateY(180deg);
  flex-direction:column;
  text-align:center;
}

.back h1 {
  font-size:28px;
  letter-spacing:4px;
}

.back p {
  margin-top:10px;
  opacity:0.6;
}

/* animações */
@keyframes rotateY {
  0%   { transform: rotateY(0deg); }
  40%  { transform: rotateY(180deg); }
  60%  { transform: rotateY(180deg); }
  100% { transform: rotateY(360deg); }
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

</style>
</head>

<body>

<div class="scene">
  <div class="circle">

    <div class="face front">
      <img src="logo.jpeg" alt="logo">
    </div>

    <div class="face back">
      <h1>COMING SOON</h1>
      <p>Algo está sendo construído</p>
    </div>

  </div>
</div>

</body>
</html>
