<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elysian Softwares</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            min-height: 100vh;
            width: 100%;
            background: #02040a;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        .ambient {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #0f172a 0%, #02040a 100%);
            z-index: -1;
        }

        .wrapper-main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1200px;
            width: 100%;
        }

        .coin-box {
            width: clamp(260px, 75vw, 380px);
            height: clamp(260px, 75vw, 380px);
            position: relative;
            transform-style: preserve-3d;
        }

        .coin {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            will-change: transform;
        }

        /* Camadas da Borda */
        .coin-layer {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: #111827;
            pointer-events: none;
            /* Força o hardware a tratar como 3D real */
            transform: translate3d(0,0,0); 
        }

        .face {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #05070f;
            backface-visibility: hidden; /* Importante para o giro */
            -webkit-backface-visibility: hidden;
        }

        .front {
            /* Z-index alto e push de 16px para frente */
            transform: rotateY(0deg) translateZ(16px);
            border: 2px solid rgba(255,255,255,0.1);
            overflow: hidden;
            z-index: 100;
        }

        .front img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover;
        }

        .back {
            /* Push de 16px para trás */
            transform: rotateY(180deg) translateZ(16px);
            border: 2px solid rgba(255,255,255,0.1);
            background: #02040a;
            flex-direction: column;
            text-align: center;
            padding: 20px;
            z-index: 99;
        }

        .back h1 { 
            font-size: clamp(20px, 6vw, 26px);
            letter-spacing: 4px;
            background: linear-gradient(to bottom, #fff, #64748b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 600;
        }

        .back p { font-size: 11px; opacity: 0.4; margin-top: 10px; text-transform: uppercase; letter-spacing: 2px; }

        footer {
            padding: 40px 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 200;
        }

        .social-links { display: flex; gap: 20px; }

        .social-icon {
            font-size: 22px;
            color: rgba(255,255,255,0.5);
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            text-decoration: none !important;
        }

        .copyright {
            font-size: 11px;
            color: rgba(255,255,255,0.2);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="ambient"></div>

    <div class="wrapper-main">
        <div class="coin-box" id="wrapper">
            <div class="coin" id="coin">
                <div class="face front">
                    <img src="logo.jpeg" alt="Logo">
                </div>
                <div class="face back">
                    <h1>COMING SOON</h1>
                    <p>Building the ideal.</p>
                </div>
                </div>
        </div>
    </div>

    <footer>
        <div class="social-links">
            <a href="https://www.instagram.com/elysian_softwares/" target="_blank" class="social-icon">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="https://www.linkedin.com/company/elysian-softwares/" target="_blank" class="social-icon">
                <i class="fab fa-linkedin-in"></i>
            </a>
        </div>
        <p class="copyright">Elysian Softwares 2026</p>
    </footer>

    <script>
        const coin = document.getElementById('coin');
        const wrapper = document.getElementById('wrapper');
        const totalLayers = 30; // Reduzi para estabilizar no mobile
        const thickness = 30;

        for (let i = 0; i < totalLayers; i++) {
            const layer = document.createElement('div');
            layer.className = 'coin-layer';
            const zPos = (i * (thickness / totalLayers)) - (thickness / 2);
            // Uso de translate3d para forçar aceleração de hardware
            layer.style.transform = `translate3d(0, 0, ${zPos}px)`;
            layer.style.background = i % 2 === 0 ? "#111827" : "#0a0f1d";
            coin.appendChild(layer);
        }

        let rot = 0;
        let tX = 0, tY = 0, cX = 0, cY = 0;

        const update = (x, y) => {
            const box = wrapper.getBoundingClientRect();
            tX = -((y - box.top) / box.height - 0.5) * 35;
            tY = ((x - box.left) / box.width - 0.5) * 35;
        };

        window.addEventListener('mousemove', (e) => update(e.clientX, e.clientY));
        window.addEventListener('touchmove', (e) => {
            update(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: true });

        const reset = () => { tX = 0; tY = 0; };
        window.addEventListener('mouseleave', reset);
        window.addEventListener('touchend', reset);

        function draw() {
            rot = (rot + 0.4) % 360;
            cX += (tX - cX) * 0.08;
            cY += (tY - cY) * 0.08;
            // Combinação de rotação automática + inclinação do mouse/touch
            coin.style.transform = `rotateX(${cX}deg) rotateY(${rot + cY}deg)`;
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
