<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elysian Softwares</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            height: 100vh;
            background: #010206;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .ambient {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #0a1125 0%, #010206 100%);
            z-index: -1;
        }

        .wrapper {
            perspective: 1200px;
            width: clamp(280px, 80vw, 380px);
            height: clamp(280px, 80vw, 380px);
        }

        .coin {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            will-change: transform;
        }

        /* A BORDA DEFINITIVA: Sólida, lisa e sem camadas extras */
        .coin-body {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: #080c14;
            /* O segredo da lateral lisa: translateZ + Box Shadow empilhado internamente */
            transform: translateZ(-12px);
            box-shadow: 
                0 0 0 1px #1e293b,
                0 0 40px rgba(0,0,0,1) inset;
        }

        /* Camadas de preenchimento lateral (apenas 3 para suavizar a curva sem bugar) */
        .edge-fill {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: #05070f;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .face {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #05070f;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .front {
            transform: translateZ(12px);
            overflow: hidden;
        }

        .front img { width: 100%; height: 100%; object-fit: cover; }

        .back {
            transform: rotateY(180deg) translateZ(12px);
            flex-direction: column;
            text-align: center;
            background: #02040a;
            padding: 20px;
        }

        .back h1 { 
            font-size: clamp(20px, 6vw, 26px);
            letter-spacing: 4px; 
            background: linear-gradient(to bottom, #fff, #64748b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 600;
        }

        .back p {
            font-size: 10px;
            color: #475569;
            letter-spacing: 3px;
            margin-top: 8px;
            text-transform: uppercase;
        }

        footer {
            position: absolute;
            bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .social-links { display: flex; gap: 20px; }
        .social-icon {
            font-size: 22px;
            color: rgba(255,255,255,0.4);
            text-decoration: none !important;
            width: 48px; height: 48px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 50%;
        }

        .copyright { font-size: 10px; color: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div class="ambient"></div>

    <div class="wrapper" id="container">
        <div class="coin" id="coin">
            <div class="coin-body"></div>
            
            <div class="edge-fill" style="transform: translateZ(-6px)"></div>
            <div class="edge-fill" style="transform: translateZ(0px)"></div>
            <div class="edge-fill" style="transform: translateZ(6px)"></div>

            <div class="face front">
                <img src="logo.jpeg" alt="Logo">
            </div>

            <div class="face back">
                <h1>COMING SOON</h1>
                <p>BUILDING THE IDEAL</p>
            </div>
        </div>
    </div>

    <footer>
        <div class="social-links">
            <a href="https://www.instagram.com/elysian_softwares/" target="_blank" class="social-icon"><i class="fab fa-instagram"></i></a>
            <a href="https://www.linkedin.com/company/elysian-softwares/" target="_blank" class="social-icon"><i class="fab fa-linkedin-in"></i></a>
        </div>
        <p class="copyright">Elysian Softwares 2026</p>
    </footer>

    <script>
        const coin = document.getElementById('coin');
        const container = document.getElementById('container');
        
        let autoRot = 0;
        let tX = 0, tY = 0, cX = 0, cY = 0;

        const update = (x, y) => {
            const rect = container.getBoundingClientRect();
            tX = -((y - rect.top) / rect.height - 0.5) * 35;
            tY = ((x - rect.left) / rect.width - 0.5) * 35;
        };

        window.addEventListener('mousemove', (e) => update(e.clientX, e.clientY));
        window.addEventListener('touchmove', (e) => update(e.touches[0].clientX, e.touches[0].clientY), {passive: true});

        function animate() {
            autoRot = (autoRot + 0.6) % 360;
            cX += (tX - cX) * 0.1;
            cY += (tY - cY) * 0.1;
            coin.style.transform = `rotateX(${cX}deg) rotateY(${autoRot + cY}deg)`;
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
